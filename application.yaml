apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-sandbox-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/maxwelcyber/mysandbox
    targetRevision: HEAD
    path: ./
    # No credentials here - they're in the secret!
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
